<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T2 Пульс | Визуализация графиков</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0d0d0d 100%);
            min-height: 100vh;
            padding: 30px;
            position: relative;
        }

        /* Фоновые элементы */
        body::before {
            content: '';
            position: fixed;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 40%, rgba(98, 0, 234, 0.05) 0%, transparent 50%);
            pointer-events: none;
            top: 0;
            left: 0;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, #6200ea, #b000ff, #6200ea);
            pointer-events: none;
        }

        /* Пульсирующие фоновые элементы */
        .pulse-ring {
            position: fixed;
            top: 20%;
            right: 10%;
            width: 250px;
            height: 250px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(98, 0, 234, 0.1) 0%, transparent 70%);
            animation: slowPulse 4s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }

        .pulse-ring2 {
            position: fixed;
            bottom: 15%;
            left: 5%;
            width: 350px;
            height: 350px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(176, 0, 255, 0.08) 0%, transparent 70%);
            animation: slowPulse 5s ease-in-out infinite reverse;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes slowPulse {
            0%, 100% {
                transform: scale(1);
                opacity: 0.3;
            }
            50% {
                transform: scale(1.3);
                opacity: 0.1;
            }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(10, 10, 15, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(98, 0, 234, 0.2);
            overflow: hidden;
            animation: fadeInUp 0.5s ease-out;
            position: relative;
            z-index: 1;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Хедер */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 32px;
            background: linear-gradient(135deg, rgba(98, 0, 234, 0.1), rgba(139, 61, 255, 0.05));
            border-bottom: 1px solid rgba(98, 0, 234, 0.2);
        }

        .logo-section h1 {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff, #b87cff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo-section p {
            font-size: 11px;
            color: #6200ea;
            letter-spacing: 2px;
            margin-top: 4px;
            text-transform: uppercase;
        }

        .user-section {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .user-info {
            text-align: right;
        }

        .user-name {
            color: #fff;
            font-weight: 600;
            font-size: 14px;
        }

        .user-role {
            color: #888;
            font-size: 11px;
            margin-top: 2px;
        }

        .nav-buttons {
            display: flex;
            gap: 10px;
        }

        .nav-btn {
            padding: 8px 20px;
            background: rgba(98, 0, 234, 0.2);
            color: #b87cff;
            border: 1px solid rgba(98, 0, 234, 0.3);
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .nav-btn:hover {
            background: rgba(98, 0, 234, 0.4);
            transform: translateY(-1px);
        }

        .logout-btn {
            padding: 8px 20px;
            background: rgba(220, 53, 69, 0.2);
            color: #ff6b6b;
            border: 1px solid rgba(220, 53, 69, 0.3);
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: #dc3545;
            color: white;
            border-color: #dc3545;
            transform: translateY(-1px);
        }

        /* Сводка */
        .summary-card {
            background: linear-gradient(135deg, rgba(98, 0, 234, 0.2), rgba(139, 61, 255, 0.1));
            border: 1px solid rgba(98, 0, 234, 0.3);
            border-radius: 20px;
            padding: 24px 32px;
            margin: 32px;
        }

        .summary-card h2 {
            color: #fff;
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 20px;
        }

        .summary-stats {
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
        }

        .summary-stat {
            text-align: center;
        }

        .summary-stat .number {
            font-size: 36px;
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff, #b87cff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .summary-stat .label {
            font-size: 12px;
            color: #aaa;
            margin-top: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Сетка графиков */
        .charts-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            padding: 0 32px 32px 32px;
        }

        .chart-card {
            background: rgba(20, 20, 30, 0.8);
            border: 1px solid rgba(98, 0, 234, 0.2);
            border-radius: 20px;
            padding: 24px;
            transition: all 0.3s ease;
        }

        .chart-card:hover {
            border-color: rgba(98, 0, 234, 0.4);
        }

        .chart-card h3 {
            color: #fff;
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 20px;
        }

        /* Кнопки переключения */
        .simple-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .simple-btn {
            padding: 8px 20px;
            background: rgba(30, 30, 45, 0.8);
            border: 1px solid rgba(98, 0, 234, 0.3);
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            color: #aaa;
            transition: all 0.3s ease;
        }

        .simple-btn:hover {
            background: rgba(98, 0, 234, 0.2);
            color: #b87cff;
        }

        .simple-btn.active {
            background: linear-gradient(135deg, #6200ea, #8b3dff);
            color: white;
            border-color: transparent;
        }

        /* Статистика */
        .simple-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }

        .simple-stat {
            background: rgba(30, 30, 45, 0.8);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
        }

        .simple-stat span {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff, #b87cff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: block;
        }

        .simple-stat label {
            font-size: 11px;
            color: #888;
            margin-top: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Контейнер графиков */
        .chart-container {
            overflow-x: auto;
            min-height: 320px;
            padding: 10px 0;
        }

        /* Столбчатая диаграмма */
        .bar-chart {
            display: flex;
            align-items: flex-end;
            gap: 12px;
            min-width: max-content;
            padding: 10px 0;
        }

        .bar-wrapper {
            text-align: center;
            min-width: 60px;
        }

        .bar {
            background: linear-gradient(180deg, #6200ea 0%, #8b3dff 100%);
            width: 100%;
            min-height: 2px;
            border-radius: 6px 6px 0 0;
            transition: height 0.3s;
            margin-bottom: 8px;
        }

        .bar-value {
            font-size: 14px;
            font-weight: 600;
            color: #b87cff;
            margin-bottom: 5px;
        }

        .bar-label {
            font-size: 11px;
            color: #888;
            word-break: break-word;
        }

        /* Таблица */
        .details-section {
            padding: 0 32px 32px 32px;
        }

        .details-section h3 {
            color: #fff;
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 20px;
        }

        .table-wrapper {
            overflow-x: auto;
            border-radius: 16px;
        }

        .stats-table {
            width: 100%;
            border-collapse: collapse;
        }

        .stats-table th {
            text-align: left;
            padding: 14px 16px;
            background: rgba(98, 0, 234, 0.1);
            color: #b87cff;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stats-table td {
            padding: 14px 16px;
            color: #ddd;
            font-size: 14px;
            border-bottom: 1px solid rgba(98, 0, 234, 0.1);
        }

        .stats-table tr:hover td {
            background: rgba(98, 0, 234, 0.05);
        }

        /* Адаптив */
        @media (max-width: 1024px) {
            .charts-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            body {
                padding: 16px;
            }

            .header {
                flex-direction: column;
                gap: 16px;
                text-align: center;
                padding: 20px;
            }

            .user-section {
                width: 100%;
                justify-content: space-between;
            }

            .summary-card {
                margin: 20px;
                padding: 20px;
            }

            .summary-stats {
                gap: 20px;
                justify-content: center;
            }

            .summary-stat .number {
                font-size: 28px;
            }

            .charts-grid {
                padding: 0 20px 20px 20px;
                gap: 16px;
            }

            .chart-card {
                padding: 16px;
            }

            .simple-stats {
                grid-template-columns: repeat(2, 1fr);
            }

            .details-section {
                padding: 0 20px 20px 20px;
            }

            .stats-table th,
            .stats-table td {
                padding: 10px 12px;
                font-size: 12px;
            }
        }

        /* Анимация загрузки */
        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="pulse-ring"></div>
    <div class="pulse-ring2"></div>

    <div class="container">
        <div class="header">
            <div class="logo-section">
                <h1>T2 Пульс</h1>
                <p>ВИЗУАЛИЗАЦИЯ ГРАФИКОВ</p>
            </div>
            <div class="user-section">
                <div class="user-info">
                    <div class="user-name" id="userName"></div>
                    <div class="user-role" id="userRole">Аналитика</div>
                </div>
                <div class="nav-buttons">
                    <button class="nav-btn" onclick="goBack()">← Назад</button>
                    <button class="logout-btn" onclick="logout()">Выйти</button>
                </div>
            </div>
        </div>

        <!-- Общая сводка -->
        <div class="summary-card">
            <h2>📈 Общая статистика</h2>
            <div class="summary-stats" id="summaryStats"></div>
        </div>

        <!-- Графики -->
        <div class="charts-grid">
            <!-- График по дням/неделям/месяцам -->
            <div class="chart-card">
                <h3>📅 Распределение смен</h3>
                <div class="simple-buttons">
                    <button class="simple-btn active" data-view="day">По дням</button>
                    <button class="simple-btn" data-view="week">По неделям</button>
                    <button class="simple-btn" data-view="month">По месяцам</button>
                </div>
                <div class="simple-stats" id="simpleStats"></div>
                <div class="chart-container" id="simpleChart"></div>
            </div>

            <!-- График по сотрудникам -->
            <div class="chart-card">
                <h3>👥 По сотрудникам</h3>
                <div class="chart-container" id="employeeChart"></div>
            </div>

            <!-- График по отделам -->
            <div class="chart-card">
                <h3>🏢 По отделам</h3>
                <div class="chart-container" id="departmentChart"></div>
            </div>

            <!-- График по статусам -->
            <div class="chart-card">
                <h3>✅ По статусам</h3>
                <div class="chart-container" id="statusChart"></div>
            </div>
        </div>

        <!-- Таблица с детальной информацией -->
        <div class="details-section">
            <h3>📋 Детальная информация по месяцам</h3>
            <div class="table-wrapper">
                <table class="stats-table" id="detailsTable">
                    <thead>
                        <tr>
                            <th>Период</th>
                            <th>Количество смен</th>
                            <th>% от общего</th>
                            <th>Рабочих часов</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let currentUser = JSON.parse(localStorage.getItem('user'));

        if (!currentUser) {
            window.location.href = '/login.html';
        }

        document.getElementById('userName').textContent = currentUser.full_name || currentUser.username || 'Пользователь';
        document.getElementById('userRole').textContent = currentUser.role === 'admin' ? 'Администратор' : (currentUser.role === 'manager' ? 'Руководитель' : 'Сотрудник');

        // Кэш данных
        let cachedShifts = [];
        let cachedEmployees = [];

        // Загрузка данных
        async function loadData() {
            try {
                const [shiftsRes, empRes] = await Promise.all([
                    fetch('/api/shifts'),
                    fetch('/api/employees')
                ]);

                cachedShifts = await shiftsRes.json();
                cachedEmployees = await empRes.json();

                updateAllCharts();
            } catch (error) {
                console.error('Ошибка загрузки данных:', error);
                document.querySelector('.charts-grid').innerHTML = '<div class="loading">❌ Ошибка загрузки данных</div>';
            }
        }

        // Обновление всех графиков
        function updateAllCharts() {
            updateSummaryStats();
            updateSimpleCharts();
            updateEmployeeChart();
            updateDepartmentChart();
            updateStatusChart();
            updateDetailsTable();
        }

        // Общая сводка
        function updateSummaryStats() {
            const shifts = cachedShifts.filter(s => s.start_time !== 'Выходной');
            const total = shifts.length;
            const approved = shifts.filter(s => s.status === 'approved').length;
            const pending = shifts.filter(s => s.status === 'pending').length;

            const uniqueDays = new Set(shifts.map(s => s.date)).size;
            const uniqueEmployees = new Set(shifts.map(s => s.user_id)).size;

            document.getElementById('summaryStats').innerHTML = `
                <div class="summary-stat">
                    <div class="number">${total}</div>
                    <div class="label">Всего смен</div>
                </div>
                <div class="summary-stat">
                    <div class="number">${uniqueDays}</div>
                    <div class="label">Рабочих дней</div>
                </div>
                <div class="summary-stat">
                    <div class="number">${uniqueEmployees}</div>
                    <div class="label">Сотрудников</div>
                </div>
                <div class="summary-stat">
                    <div class="number">${approved}</div>
                    <div class="label">Подтверждено</div>
                </div>
                <div class="summary-stat">
                    <div class="number">${pending}</div>
                    <div class="label">На рассмотрении</div>
                </div>
            `;
        }

        // Простая визуализация (по дням/неделям/месяцам)
        function updateSimpleCharts() {
            const shifts = cachedShifts.filter(s => s.start_time !== 'Выходной');

            const byDay = {};
            const byWeek = {};
            const byMonth = {};
            let total = shifts.length;

            shifts.forEach(shift => {
                const date = shift.date;

                byDay[date] = (byDay[date] || 0) + 1;
                const month = date.slice(0, 7);
                byMonth[month] = (byMonth[month] || 0) + 1;

                const d = new Date(date);
                const weekNum = Math.ceil(d.getDate() / 7);
                const week = `${date.slice(0, 4)}-W${weekNum}`;
                byWeek[week] = (byWeek[week] || 0) + 1;
            });

            const daysCount = Object.keys(byDay).length;
            const avg = daysCount > 0 ? (total / daysCount).toFixed(1) : 0;
            const max = Math.max(...Object.values(byDay), 0);

            document.getElementById('simpleStats').innerHTML = `
                <div class="simple-stat">
                    <span>${total}</span>
                    <label>Всего смен</label>
                </div>
                <div class="simple-stat">
                    <span>${daysCount}</span>
                    <label>Рабочих дней</label>
                </div>
                <div class="simple-stat">
                    <span>${avg}</span>
                    <label>В среднем в день</label>
                </div>
                <div class="simple-stat">
                    <span>${max}</span>
                    <label>Максимум в день</label>
                </div>
            `;

            const activeView = document.querySelector('.simple-btn.active').dataset.view;
            let data, labels;

            if (activeView === 'day') {
                labels = Object.keys(byDay).sort();
                data = labels.map(d => byDay[d]);
            } else if (activeView === 'week') {
                labels = Object.keys(byWeek).sort();
                data = labels.map(w => byWeek[w]);
            } else {
                labels = Object.keys(byMonth).sort();
                data = labels.map(m => byMonth[m]);
            }

            drawBarChart('simpleChart', labels, data);
        }

        // График по сотрудникам
        function updateEmployeeChart() {
            const shifts = cachedShifts.filter(s => s.start_time !== 'Выходной');
            const byEmployee = {};

            shifts.forEach(shift => {
                const name = shift.full_name || 'Неизвестно';
                byEmployee[name] = (byEmployee[name] || 0) + 1;
            });

            const sorted = Object.entries(byEmployee).sort((a, b) => b[1] - a[1]).slice(0, 10);
            const labels = sorted.map(e => e[0]);
            const data = sorted.map(e => e[1]);

            drawBarChart('employeeChart', labels, data);
        }

        // График по отделам
        function updateDepartmentChart() {
            const shifts = cachedShifts.filter(s => s.start_time !== 'Выходной');
            const byDept = {};

            shifts.forEach(shift => {
                const dept = shift.department || 'Без отдела';
                byDept[dept] = (byDept[dept] || 0) + 1;
            });

            const sorted = Object.entries(byDept).sort((a, b) => b[1] - a[1]);
            const labels = sorted.map(e => e[0]);
            const data = sorted.map(e => e[1]);

            drawBarChart('departmentChart', labels, data);
        }

        // График по статусам
        function updateStatusChart() {
            const shifts = cachedShifts;
            const byStatus = {
                'pending': 0,
                'approved': 0,
                'rejected': 0
            };

            shifts.forEach(shift => {
                if (byStatus.hasOwnProperty(shift.status)) {
                    byStatus[shift.status]++;
                }
            });

            const labels = ['На рассмотрении', 'Подтверждено', 'Отклонено'];
            const data = [byStatus.pending, byStatus.approved, byStatus.rejected];
            const colors = ['#ffc107', '#2ecc71', '#ff6b6b'];

            drawPieChart('statusChart', labels, data, colors);
        }

        // Таблица с деталями
        function updateDetailsTable() {
            const shifts = cachedShifts.filter(s => s.start_time !== 'Выходной');
            const byMonth = {};

            shifts.forEach(shift => {
                const month = shift.date.slice(0, 7);
                if (!byMonth[month]) {
                    byMonth[month] = { count: 0, hours: 0 };
                }
                byMonth[month].count++;

                if (shift.start_time && shift.end_time && shift.start_time !== 'Выходной') {
                    const start = shift.start_time.split(':').map(Number);
                    const end = shift.end_time.split(':').map(Number);
                    let hours = end[0] - start[0];
                    if (hours < 0) hours += 24;
                    byMonth[month].hours += hours;
                }
            });

            const total = shifts.length;
            const tbody = document.querySelector('#detailsTable tbody');
            tbody.innerHTML = '';

            if (Object.keys(byMonth).length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align: center; padding: 40px;">📭 Нет данных для отображения</td></tr>';
                return;
            }

            Object.entries(byMonth).sort((a, b) => b[0].localeCompare(a[0])).forEach(([month, data]) => {
                const row = tbody.insertRow();
                const percent = total > 0 ? ((data.count / total) * 100).toFixed(1) : 0;
                row.innerHTML = `
                    <td><strong>${month}</strong></td>
                    <td>${data.count}</td>
                    <td>${percent}%</td>
                    <td>~${data.hours} ч.</td>
                `;
            });
        }

        // Отрисовка столбчатой диаграммы
        function drawBarChart(containerId, labels, data) {
            const container = document.getElementById(containerId);
            
            if (!data || data.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 40px; color: #666;">📊 Нет данных для отображения</div>';
                return;
            }

            const maxValue = Math.max(...data, 1);
            const colors = ['#6200ea', '#8b3dff', '#b87cff', '#9b59b6', '#a569bd'];

            let html = '<div class="bar-chart">';

            for (let i = 0; i < data.length; i++) {
                const height = (data[i] / maxValue) * 180;
                const color = colors[i % colors.length];
                html += `
                    <div class="bar-wrapper">
                        <div class="bar-value">${data[i]}</div>
                        <div class="bar" style="height: ${Math.max(height, 4)}px; background: linear-gradient(180deg, ${color} 0%, #6200ea 100%);"></div>
                        <div class="bar-label" title="${labels[i]}">${labels[i].length > 15 ? labels[i].slice(0, 12) + '...' : labels[i]}</div>
                    </div>
                `;
            }

            html += '</div>';
            container.innerHTML = html;
        }

        // Отрисовка круговой диаграммы
        function drawPieChart(containerId, labels, data, colors) {
            const container = document.getElementById(containerId);
            const total = data.reduce((a, b) => a + b, 0);

            if (total === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 40px; color: #666;">📊 Нет данных для отображения</div>';
                return;
            }

            let html = '<div style="display: flex; gap: 30px; align-items: center; flex-wrap: wrap; justify-content: center;">';
            
            // SVG круговая диаграмма
            html += '<div style="position: relative; width: 180px; height: 180px;">';
            let cumulative = 0;
            const paths = data.map((value, i) => {
                const percent = value / total;
                const startAngle = cumulative * 2 * Math.PI;
                cumulative += percent;
                const endAngle = cumulative * 2 * Math.PI;

                const x1 = 90 + 80 * Math.cos(startAngle);
                const y1 = 90 + 80 * Math.sin(startAngle);
                const x2 = 90 + 80 * Math.cos(endAngle);
                const y2 = 90 + 80 * Math.sin(endAngle);

                const largeArc = percent > 0.5 ? 1 : 0;

                return `<path d="M 90 90 L ${x1} ${y1} A 80 80 0 ${largeArc} 1 ${x2} ${y2} Z" fill="${colors[i]}" stroke="#1a1a2a" stroke-width="2"/>`;
            });

            html += `<svg width="180" height="180" viewBox="0 0 180 180">${paths.join('')}</svg>`;
            html += '</div>';

            // Легенда
            html += '<div>';
            data.forEach((value, i) => {
                const percent = ((value / total) * 100).toFixed(1);
                html += `
                    <div style="display: flex; align-items: center; margin-bottom: 10px;">
                        <div style="width: 16px; height: 16px; background: ${colors[i]}; margin-right: 12px; border-radius: 4px;"></div>
                        <div style="color: #ddd;"><span style="color: #fff; font-weight: 500;">${labels[i]}</span>: ${value} (${percent}%)</div>
                    </div>
                `;
            });
            html += '</div></div>';

            container.innerHTML = html;
        }

        // Переключение между видами
        document.querySelectorAll('.simple-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.simple-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                updateSimpleCharts();
            });
        });

        function goBack() {
            if (currentUser.role === 'admin') {
                window.location.href = '/admin.html';
            } else if (currentUser.role === 'manager') {
                window.location.href = '/manager.html';
            } else {
                window.location.href = '/employee.html';
            }
        }

        function logout() {
            localStorage.removeItem('user');
            window.location.href = '/login.html';
        }

        // Загрузка при старте
        loadData();
    </script>
</body>
</html>
