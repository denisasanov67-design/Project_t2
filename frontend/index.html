<!-- Добавьте перед основным контейнером -->
<div id="loginForm" style="max-width: 400px; margin: 50px auto;">
    <h2>Вход в систему</h2>
    <form onsubmit="login(event)">
        <input type="text" id="username" placeholder="Логин" required>
        <input type="password" id="password" placeholder="Пароль" required>
        <button type="submit">Войти</button>
    </form>
    <div id="loginError" class="error"></div>
</div>

<div id="mainApp" style="display: none;">
    <!-- Ваш существующий контейнер -->
    <div class="container">
        <!-- ... остальное содержимое ... -->
    </div>
</div>

<script>
// API конфигурация
const API_URL = 'http://localhost:8000';  // Замените на URL вашего бэкенда
let authToken = localStorage.getItem('token');
let currentUserRole = localStorage.getItem('role');

// Проверка авторизации при загрузке
if (authToken) {
    document.getElementById('loginForm').style.display = 'none';
    document.getElementById('mainApp').style.display = 'block';
    loadInitialData();
} else {
    document.getElementById('loginForm').style.display = 'block';
    document.getElementById('mainApp').style.display = 'none';
}

async function login(event) {
    event.preventDefault();
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;

    try {
        const formData = new FormData();
        formData.append('username', username);
        formData.append('password', password);

        const response = await fetch(`${API_URL}/token`, {
            method: 'POST',
            body: formData
        });

        if (response.ok) {
            const data = await response.json();
            authToken = data.access_token;
            currentUserRole = data.role;

            localStorage.setItem('token', authToken);
            localStorage.setItem('role', currentUserRole);

            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';

            // Скрываем или показываем элементы в зависимости от роли
            if (currentUserRole === 'employee') {
                // Сотрудник видит только свои данные
                document.querySelector('form#selectionForm').style.display = 'none';
            }

            await loadInitialData();
        } else {
            document.getElementById('loginError').textContent = 'Неверный логин или пароль';
        }
    } catch (error) {
        document.getElementById('loginError').textContent = 'Ошибка соединения с сервером';
    }
}

async function loadInitialData() {
    try {
        // Загружаем данные альянсов и групп
        const initResponse = await fetch(`${API_URL}/api/init-data`, {
            headers: { 'Authorization': `Bearer ${authToken}` }
        });
        const alliancesData = await initResponse.json();

        // Обновляем глобальную переменную
        window.alliancesData = alliancesData;

        // Загружаем существующие смены
        await loadEmployees();
    } catch (error) {
        console.error('Ошибка загрузки данных:', error);
    }
}

async function loadEmployees() {
    try {
        const response = await fetch(`${API_URL}/api/employees`, {
            headers: { 'Authorization': `Bearer ${authToken}` }
        });
        const employees = await response.json();

        // Адаптируем формат под ваш существующий код
        const adaptedEmployees = employees.map(emp => ({
            ...emp,
            shifts: emp.shifts.map(shift => ({
                date: shift.date,
                startTime: shift.startTime,
                endTime: shift.endTime,
                status: shift.status
            }))
        }));

        // Обновляем таблицу (используем вашу существующую функцию)
        updateTable(adaptedEmployees);
        calculateSummary(adaptedEmployees);

        // Сохраняем в глобальную переменную для других функций
        window.currentEmployees = adaptedEmployees;
    } catch (error) {
        console.error('Ошибка загрузки сотрудников:', error);
    }
}

// Модифицируем функцию добавления смены
document.getElementById('scheduleForm').addEventListener('submit', async function(event) {
    event.preventDefault();

    const alliance = document.getElementById('alliance').value;
    const group = document.getElementById('group').value;
    const employeeName = document.getElementById('employee').value;
    const date = document.getElementById('date').value;
    const startTime = document.getElementById('startTime').value;
    const endTime = document.getElementById('endTime').value;

    // ... ваши существующие проверки ...

    // Находим ID сотрудника
    const employee = window.currentEmployees.find(emp =>
        emp.name === employeeName &&
        emp.alliance === alliance &&
        emp.group === group
    );

    if (!employee) {
        showError('Сотрудник не найден');
        return;
    }

    try {
        const response = await fetch(`${API_URL}/api/shifts?employee_id=${employee.id}`, {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${authToken}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                date: date,
                start_time: startTime,
                end_time: endTime || null
            })
        });

        if (response.ok) {
            await loadEmployees(); // Перезагружаем данные
            showError('');

            // Очищаем форму
            document.getElementById('startTime').value = '';
            document.getElementById('endTime').innerHTML = '<option value="">-- Выберите время --</option>';
            document.getElementById('endTime').disabled = true;
        } else {
            const error = await response.json();
            showError(error.detail || 'Ошибка при добавлении смены');
        }
    } catch (error) {
        showError('Ошибка соединения с сервером');
    }
});

// Функция удаления смены
async function deleteShift(employeeIndex, shiftIndex) {
    const employee = window.currentEmployees[employeeIndex];
    const shift = employee.shifts[shiftIndex];

    try {
        const response = await fetch(`${API_URL}/api/shifts/${shift.id}`, {
            method: 'DELETE',
            headers: { 'Authorization': `Bearer ${authToken}` }
        });

        if (response.ok) {
            await loadEmployees();
            hideEmployeeDetails();
        }
    } catch (error) {
        showError('Ошибка при удалении смены');
    }
}

// Функция выхода
function logout() {
    localStorage.removeItem('token');
    localStorage.removeItem('role');
    location.reload();
}
</script>
